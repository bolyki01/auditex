name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest

      - name: Smoke help
        run: |
          auditex --help
          auditex doctor --json
          auditex guided-run --help

      - name: Contract smoke
        run: |
          auditex run --offline --sample examples/sample_audit_bundle/sample_result.json --tenant-name ci --run-name contract --out outputs/ci-contract
          python - <<'PY'
          import json
          from pathlib import Path
          run = Path("outputs/ci-contract/ci-contract")
          validation = json.loads((run / "validation.json").read_text(encoding="utf-8"))
          manifest = json.loads((run / "run-manifest.json").read_text(encoding="utf-8"))
          assert validation["valid"], validation["issues"]
          assert manifest["contract_status"] == "valid"
          assert (run / "index" / "evidence.sqlite").exists()
          assert (run / "ai_context.json").exists()
          PY
