name: auditex-audit

on:
  workflow_dispatch:
    inputs:
      tenant_name:
        description: "Label for the audit run output folder"
        required: true
        default: "ci"
      fail_on:
        description: "Severity threshold that fails the gate"
        required: true
        default: "high"
        type: choice
        options:
          - critical
          - high
          - medium
          - low
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Auditex
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run offline contract bundle
        run: |
          auditex run \
            --offline \
            --sample examples/sample_audit_bundle/sample_result.json \
            --tenant-name "${{ github.event.inputs.tenant_name || 'scheduled' }}" \
            --run-name audit \
            --out outputs/audit
          echo "RUN_DIR=outputs/audit/$(ls outputs/audit | head -n 1)" >> "$GITHUB_ENV"

      - name: Render SARIF
        run: |
          auditex export run sarif "$RUN_DIR" \
            --output outputs/audit/findings.sarif.json
          ls -la outputs/audit

      - name: Render OSCAL Assessment Results
        run: |
          auditex export run oscal "$RUN_DIR" \
            --output outputs/audit/findings.oscal.json

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: outputs/audit/findings.sarif.json
          category: auditex

      - name: Archive audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: auditex-bundle
          path: |
            ${{ env.RUN_DIR }}
            outputs/audit/findings.sarif.json
            outputs/audit/findings.oscal.json
          retention-days: 14

      - name: Severity gate
        run: |
          set +e
          auditex gate "$RUN_DIR" --fail-on "${{ github.event.inputs.fail_on || 'high' }}" | tee gate.json
          status=${PIPESTATUS[0]}
          echo "AUDITEX_GATE_STATUS=$status" >> "$GITHUB_ENV"
          exit $status
