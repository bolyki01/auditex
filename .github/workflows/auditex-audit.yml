name: auditex-audit

on:
  workflow_dispatch:
    inputs:
      tenant_name:
        description: "Label for the audit run output folder"
        required: true
        default: "ci"
      fail_on:
        description: "Severity threshold that fails the gate"
        required: true
        default: "high"
        type: choice
        options:
          - critical
          - high
          - medium
          - low
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # F1 (2026-05-09): every ``uses:`` is pinned to a full commit SHA per
      # OpenSSF Scorecard guidance. The trailing comment records the human-
      # readable tag the SHA corresponds to so future reviewers can spot
      # stale pins. To bump: re-run scripts/refresh-action-shas.sh (or
      # ``gh api /repos/<action>/git/ref/tags/<tag>``) and replace both the
      # SHA and the comment.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Auditex
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run offline contract bundle
        run: |
          auditex run \
            --offline \
            --sample examples/sample_audit_bundle/sample_result.json \
            --tenant-name "${{ github.event.inputs.tenant_name || 'scheduled' }}" \
            --run-name audit \
            --out outputs/audit
          echo "RUN_DIR=outputs/audit/$(ls outputs/audit | head -n 1)" >> "$GITHUB_ENV"

      - name: Render SARIF
        run: |
          auditex export run sarif "$RUN_DIR" \
            --output outputs/audit/findings.sarif.json
          ls -la outputs/audit

      - name: Render OSCAL Assessment Results
        run: |
          auditex export run oscal "$RUN_DIR" \
            --output outputs/audit/findings.oscal.json

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3.35.4
        with:
          sarif_file: outputs/audit/findings.sarif.json
          category: auditex

      - name: Archive audit bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: auditex-bundle
          path: |
            ${{ env.RUN_DIR }}
            outputs/audit/findings.sarif.json
            outputs/audit/findings.oscal.json
          retention-days: 14

      - name: Severity gate
        run: |
          set +e
          auditex gate "$RUN_DIR" --fail-on "${{ github.event.inputs.fail_on || 'high' }}" | tee gate.json
          status=${PIPESTATUS[0]}
          echo "AUDITEX_GATE_STATUS=$status" >> "$GITHUB_ENV"
          exit $status
